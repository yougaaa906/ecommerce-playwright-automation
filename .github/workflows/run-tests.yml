name: E2E Test and Publish Online Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Force the actions runner to use Node 24 to align with 2026 standards
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5 

      - name: Clone frontend e-commerce project
        run: git clone https://github.com/secureprivacy/example-e-commerce-website.git frontend

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Start frontend server
        run: |
          cd frontend
          npm run dev -- --port 5173 &

      - name: Wait for server readiness
        run: sleep 15

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps ${{ matrix.browser }}

      - name: Run automation tests
        run: pytest --browser ${{ matrix.browser }} --html=reports/report_${{ matrix.browser }}.html --self-contained-html

      - name: Upload temporary artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reports-${{ matrix.browser }}
          path: reports/
          retention-days: 1

  deploy:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-reports
          pattern: reports-*
          merge-multiple: true

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: all-reports

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
