[pytest]
# Custom test markers for test categorization
markers =
    cookie_test: Tests for cookie consent banner functionality

# Test discovery configuration
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Root directory for test cases
testpaths = tests

# Command line options for pytest (verbose + HTML report)
addopts = -v --html=reports/index.html --self-contained-html

# Logging configuration
log_cli = true
log_file = logs/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s - %(levelname)s - %(message)s
